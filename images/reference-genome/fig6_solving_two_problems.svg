<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <style>
    .eyebrow{font-size:12px;font-weight:600;letter-spacing:2px;fill:#64748B;}
    .title{font-size:22px;font-weight:700;fill:#14213D;}
    .col-header{font-size:15.5px;font-weight:700;}
    .problem-text{font-size:13px;font-weight:600;fill:#334155;}
    .sol-text{font-size:13px;font-weight:700;fill:#FFFFFF;}
    .sol-label{font-size:12px;font-weight:700;letter-spacing:1px;fill:#64748B;}
    .arrow{stroke:#94A3B8;stroke-width:1.75;fill:none;marker-end:url(#arrow6);}
  </style>

  <rect width="1000" height="900" fill="#FFFFFF"/>

  <text x="60" y="42" class="eyebrow">FIGURE 6</text>
  <text x="60" y="70" class="title">Distinct Problems Require Distinct Solutions</text>
  <line x1="60" y1="86" x2="940" y2="86" stroke="#E2E8F0" stroke-width="1.5"/>

  <line x1="500" y1="112" x2="500" y2="740" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- LEFT PANEL: ALT contig problem -->
  <text x="260" y="128" text-anchor="middle" class="col-header" style="fill:#1B4F72">Reference Genome Structure</text>
  <text x="260" y="150" text-anchor="middle" class="sol-label">PROBLEM</text>

  <rect x="150" y="164" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="260" y="190" text-anchor="middle" class="problem-text">ALT Contigs</text>
  <path d="M260,206 L260,224" class="arrow"/>

  <rect x="150" y="226" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="260" y="252" text-anchor="middle" class="problem-text">Multiple Mapping</text>
  <path d="M260,268 L260,286" class="arrow"/>

  <rect x="150" y="288" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="260" y="314" text-anchor="middle" class="problem-text">MAPQ = 0</text>
  <path d="M260,330 L260,354" class="arrow" stroke="#17A398" marker-end="url(#arrow6)"/>

  <text x="260" y="378" text-anchor="middle" class="sol-label" style="fill:#0F7A70">SOLUTION</text>

  <rect x="130" y="392" width="260" height="46" rx="6" fill="#1B4F72"/>
  <text x="260" y="420" text-anchor="middle" class="sol-text">ALT-aware Alignment</text>

  <text x="260" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8">&#8212; or &#8212;</text>

  <rect x="130" y="470" width="260" height="46" rx="6" fill="#17A398"/>
  <text x="260" y="498" text-anchor="middle" class="sol-text">Primary Assembly (when appropriate)</text>

  <!-- RIGHT PANEL: pseudogene problem -->
  <text x="740" y="128" text-anchor="middle" class="col-header" style="fill:#1B4F72">Locus Biology</text>
  <text x="740" y="150" text-anchor="middle" class="sol-label">PROBLEM</text>

  <rect x="630" y="164" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="740" y="190" text-anchor="middle" class="problem-text">GBAP1 Pseudogene</text>
  <path d="M740,206 L740,224" class="arrow"/>

  <rect x="630" y="226" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="740" y="252" text-anchor="middle" class="problem-text">Sequence Homology</text>
  <path d="M740,268 L740,286" class="arrow"/>

  <rect x="630" y="288" width="220" height="42" rx="6" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="740" y="314" text-anchor="middle" class="problem-text">Misalignment</text>
  <path d="M740,330 L740,354" class="arrow" stroke="#17A398" marker-end="url(#arrow6)"/>

  <text x="740" y="378" text-anchor="middle" class="sol-label" style="fill:#0F7A70">SOLUTIONS</text>

  <rect x="610" y="392" width="260" height="40" rx="6" fill="#1B4F72"/>
  <text x="740" y="417" text-anchor="middle" class="sol-text">Amplicon Sequencing</text>

  <rect x="610" y="440" width="260" height="40" rx="6" fill="#1B4F72"/>
  <text x="740" y="465" text-anchor="middle" class="sol-text">Oxford Nanopore Long Reads</text>

  <rect x="610" y="488" width="260" height="40" rx="6" fill="#17A398"/>
  <text x="740" y="513" text-anchor="middle" class="sol-text">Gauchian</text>

  <!-- merge into shared outcome -->
  <path d="M260,516 L260,560" stroke="#94A3B8" stroke-width="1.75" fill="none"/>
  <path d="M740,528 L740,560" stroke="#94A3B8" stroke-width="1.75" fill="none"/>
  <path d="M260,560 L740,560" stroke="#94A3B8" stroke-width="1.75" fill="none"/>
  <path d="M500,560 L500,582" class="arrow"/>

  <rect x="330" y="584" width="340" height="52" rx="6" fill="#14213D"/>
  <text x="500" y="616" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Correct Variant Assignment</text>

  <!-- Footer note -->
  <rect x="60" y="700" width="880" height="80" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.25"/>
  <text x="82" y="728" font-size="12.5" fill="#334155">Alt-aware alignment resolves ambiguity introduced by the reference genome itself.</text>
  <text x="82" y="748" font-size="12.5" fill="#334155">Targeted sequencing or purpose-built callers resolve ambiguity arising from true</text>
  <text x="82" y="768" font-size="12.5" fill="#334155">sequence homology between a gene and its pseudogene. Both are usually needed for GBA1.</text>
</svg>
